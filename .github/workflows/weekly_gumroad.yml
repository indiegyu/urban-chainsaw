name: Weekly Gumroad Product

on:
  schedule:
    - cron: "0 7 * * 3"   # 수요일 07:00 UTC
    - cron: "0 7 * * 6"   # 토요일 07:00 UTC  (주 2회 신규 상품)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-product:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests python-dotenv -q

      - name: Generate digital product
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -u scripts/products/auto_product.py

      - name: Publish to Lemon Squeezy
        env:
          LEMONSQUEEZY_API_KEY: ${{ secrets.LEMONSQUEEZY_API_KEY }}
        run: python -u scripts/products/gumroad_publisher.py

      - name: Commit product files + updated strategy
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin ${{ github.ref_name }}
          git reset --soft origin/${{ github.ref_name }}
          git add scripts/products/output/ scripts/strategy/content_strategy.json
          git commit -m "ci: new product week $(date +%V) [skip ci]" || echo "No changes"
          git push origin HEAD:${{ github.ref_name }}
