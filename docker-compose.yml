version: "3.8"

# ╔══════════════════════════════════════════════════════════╗
# ║  Urban-Chainsaw  –  자동 수익 창출 인프라 (완전 무료)     ║
# ║  $ docker compose up -d                                  ║
# ╚══════════════════════════════════════════════════════════╝

services:

  # ── n8n: 워크플로 오케스트레이션 ─────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: urban_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - NODE_ENV=production
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # 워크플로 자동 import
      - N8N_IMPORT_CREDENTIALS_FROM_ENV=true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro       # 워크플로 JSON 마운트
    networks:
      - urban_net
    depends_on:
      - postgres

  # ── PostgreSQL: n8n + Ghost 공유 DB ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: urban_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-urban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-ghost-db.sql:/docker-entrypoint-initdb.d/init-ghost.sql:ro
    networks:
      - urban_net

  # ── Ghost: AI 블로그 + Affiliate 콘텐츠 CMS ──────────────
  ghost:
    image: ghost:5-alpine
    container_name: urban_ghost
    restart: unless-stopped
    ports:
      - "2368:2368"
    environment:
      url: ${GHOST_URL:-http://localhost:2368}
      database__client: mysql
      database__connection__host: ghost_mysql
      database__connection__user: ghost
      database__connection__password: ${GHOST_DB_PASSWORD}
      database__connection__database: ghost
      mail__transport: SMTP
      mail__options__host: smtp.gmail.com
      mail__options__port: 587
      mail__options__auth__user: ${GMAIL_USER:-}
      mail__options__auth__pass: ${GMAIL_APP_PASSWORD:-}
    volumes:
      - ghost_data:/var/lib/ghost/content
    networks:
      - urban_net
    depends_on:
      - ghost_mysql

  # ── MySQL: Ghost 전용 DB ──────────────────────────────────
  ghost_mysql:
    image: mysql:8.0
    container_name: urban_ghost_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${GHOST_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ${GHOST_DB_PASSWORD}
    volumes:
      - ghost_mysql_data:/var/lib/mysql
    networks:
      - urban_net

  # ── Redis: 캐싱 + 작업 큐 ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: urban_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - urban_net

# ── 볼륨 ─────────────────────────────────────────────────────
volumes:
  n8n_data:
  postgres_data:
  ghost_data:
  ghost_mysql_data:
  redis_data:

# ── 네트워크 ──────────────────────────────────────────────────
networks:
  urban_net:
    driver: bridge
