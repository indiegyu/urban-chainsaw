name: YouTube Channel Manager

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action: all / private / optimize"
        default: "all"
        type: string

permissions:
  contents: write

jobs:
  manage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          pip install requests python-dotenv Pillow 2>&1
          python -c "import requests, PIL; print('imports OK')"

      - name: Check secrets
        env:
          YT_FULL_REFRESH_TOKEN: ${{ secrets.YT_FULL_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          echo "YT_FULL_REFRESH_TOKEN set: $( [ -n "$YT_FULL_REFRESH_TOKEN" ] && echo YES || echo NO )"
          echo "GOOGLE_CLIENT_ID set:      $( [ -n "$GOOGLE_CLIENT_ID" ] && echo YES || echo NO )"
          echo "GOOGLE_CLIENT_SECRET set:  $( [ -n "$GOOGLE_CLIENT_SECRET" ] && echo YES || echo NO )"
          if [ -z "$YT_FULL_REFRESH_TOKEN" ]; then
            echo "ERROR: YT_FULL_REFRESH_TOKEN is empty"
            exit 1
          fi
          if [ -z "$GOOGLE_CLIENT_ID" ]; then
            echo "ERROR: GOOGLE_CLIENT_ID is empty"
            exit 1
          fi
          if [ -z "$GOOGLE_CLIENT_SECRET" ]; then
            echo "ERROR: GOOGLE_CLIENT_SECRET is empty"
            exit 1
          fi
          echo "All secrets present — proceeding"

      - name: Create token_yt.json
        env:
          YT_REFRESH_TOKEN:    ${{ secrets.YT_FULL_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID:    ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          YOUTUBE_REFRESH_TOKEN="$YT_REFRESH_TOKEN" \
          YT_SCOPE="https://www.googleapis.com/auth/youtube" \
          python3 scripts/video/make_token.py token_yt.json
          echo "token_yt.json created:"
          python3 -c "
          import json
          t = json.load(open('token_yt.json'))
          print('  client_id set:', bool(t.get('client_id')))
          print('  refresh_token set:', bool(t.get('refresh_token')))
          print('  scope:', t.get('scopes'))
          "

      - name: Run channel manager
        run: python3 -u scripts/video/manage_channel.py ${{ github.event.inputs.action }}

      - name: Commit channel assets
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin ${{ github.ref_name }}
          git reset --soft origin/${{ github.ref_name }}
          git add scripts/video/channel_assets/ 2>/dev/null || true
          git commit -m "ci: channel assets updated [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:${{ github.ref_name }}
