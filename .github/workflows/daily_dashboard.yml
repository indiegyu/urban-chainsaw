name: Daily Revenue Dashboard

on:
  schedule:
    - cron: "0 22 * * *"   # 매일 22:00 UTC — 하루 콘텐츠 다 올라간 후 집계
  workflow_dispatch:         # 언제든 수동 새로고침 가능

permissions:
  contents: write

jobs:
  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests python-dotenv -q

      - name: Restore OAuth token
        env:
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YT_REFRESH_TOKEN:      ${{ secrets.YT_FULL_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: python3 scripts/video/make_token.py

      - name: Generate dashboard
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -u scripts/analytics/revenue_dashboard.py

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin ${{ github.ref_name }}
          git reset --soft origin/${{ github.ref_name }}
          git add docs/dashboard.html
          git commit -m "ci: dashboard update $(date -u +%Y-%m-%d) [skip ci]" || echo "No changes"
          git push origin HEAD:${{ github.ref_name }} || \
            (git pull origin ${{ github.ref_name }} --rebase && git push origin HEAD:${{ github.ref_name }})
