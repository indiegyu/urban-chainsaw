name: Daily POD Design Generator

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Number of designs to generate"
        default: "5"
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Generate POD designs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          COUNT="${{ github.event.inputs.count || '5' }}"
          python scripts/pod/generate_designs.py "$COUNT"

      - name: Commit generated designs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin ${{ github.ref_name }}
          git reset --soft origin/${{ github.ref_name }}
          git add scripts/pod/output/
          git commit -m "ci: pod designs $(date -u +%Y-%m-%d) [skip ci]" || echo "No changes"
          git push origin HEAD:${{ github.ref_name }} || \
            (git pull origin ${{ github.ref_name }} --rebase && git push origin HEAD:${{ github.ref_name }})

      - name: Upload design artifacts (7-day retention)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pod-designs-${{ github.run_id }}
          path: scripts/pod/output/
          retention-days: 7
