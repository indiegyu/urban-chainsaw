name: 💰 제휴 링크 페이지 생성

on:
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC (19:00 KST) 매일
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-affiliate-page:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate affiliate links page
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          AMAZON_TAG:          ${{ secrets.AMAZON_TAG }}
          FIVERR_AFF_ID:       ${{ secrets.FIVERR_AFF_ID }}
          ELEVENLABS_AFF_ID:   ${{ secrets.ELEVENLABS_AFF_ID }}
          CONVERTKIT_AFF_ID:   ${{ secrets.CONVERTKIT_AFF_ID }}
          SEMRUSH_AFF_ID:      ${{ secrets.SEMRUSH_AFF_ID }}
          PRINTIFY_AFF_ID:     ${{ secrets.PRINTIFY_AFF_ID }}
          HOSTINGER_AFF_ID:    ${{ secrets.HOSTINGER_AFF_ID }}
          JASPER_AFF_ID:       ${{ secrets.JASPER_AFF_ID }}
        run: python -m scripts.monetize.affiliate_generator

      - name: Commit generated affiliate page
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin ${{ github.ref_name }}
          git reset --soft origin/${{ github.ref_name }}
          git add scripts/monetize/output/
          git commit -m "ci: affiliate links page [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:${{ github.ref_name }} || \
            (git pull origin ${{ github.ref_name }} --rebase && git push origin HEAD:${{ github.ref_name }})
