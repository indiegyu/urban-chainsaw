name: YouTube Channel Manager

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action: all / private / optimize"
        default: "all"
        type: string

permissions:
  contents: write

jobs:
  manage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests python-dotenv Pillow -q

      - name: Create token_yt.json
        env:
          YT_REFRESH_TOKEN: ${{ secrets.YT_FULL_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          YOUTUBE_REFRESH_TOKEN=$YT_REFRESH_TOKEN \
          YT_SCOPE=https://www.googleapis.com/auth/youtube \
          python3 scripts/video/make_token.py token_yt.json

      - name: Run channel manager
        run: python3 scripts/video/manage_channel.py ${{ github.event.inputs.action }}

      - name: Commit channel assets
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin ${{ github.ref_name }}
          git reset --soft origin/${{ github.ref_name }}
          git add scripts/video/channel_assets/ 2>/dev/null || true
          git commit -m "ci: channel assets updated [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:${{ github.ref_name }}
