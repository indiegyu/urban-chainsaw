name: Daily POD Design Generator

# 매일 디자인 생성 (Printify 연동 없이 디자인 파일만 생성 → 아티팩트 저장)
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Number of designs to generate"
        default: "5"
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Generate POD designs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          COUNT="${{ github.event.inputs.count || '5' }}"
          python scripts/pod/generate_designs.py "$COUNT"

      - name: Upload design artifacts (7-day retention)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pod-designs-${{ github.run_id }}
          path: scripts/pod/output/
          retention-days: 7
