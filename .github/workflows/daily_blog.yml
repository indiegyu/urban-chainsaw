name: Daily Blog Post Generation

on:
  schedule:
    - cron: "0 8  * * *"   # 08:00 UTC — 오전 포스트
    - cron: "0 16 * * *"   # 16:00 UTC — 오후 포스트 (하루 2편)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Generate blog post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/blog/generate_post.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin ${{ github.ref_name }}
          git reset --soft origin/${{ github.ref_name }}
          git add scripts/blog/output/
          git commit -m "ci: blog post [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:${{ github.ref_name }} || \
            (git pull origin ${{ github.ref_name }} --rebase && git push origin HEAD:${{ github.ref_name }})
