name: Daily Blog Post Generation

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  push:
    branches:
      - claude/research-income-automation-fNwfz
    paths:
      - .github/workflows/daily_blog.yml
      - scripts/blog/**

permissions:
  contents: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Generate blog post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/blog/generate_post.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin
          git reset --soft origin/claude/research-income-automation-fNwfz
          git add scripts/blog/output/
          git commit -m "ci: blog post [skip ci]" || echo "Nothing to commit"
          git push
