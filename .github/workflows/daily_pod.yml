name: Daily POD Auto-Listing

# 매일 오전 8시(UTC) = 한국시간 오후 5시에 실행
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:        # 수동 실행 버튼
    inputs:
      count:
        description: "Number of designs to generate"
        default: "5"
        type: string

jobs:
  generate-and-list:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate designs
        env:
          IDEOGRAM_API_KEY: ${{ secrets.IDEOGRAM_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          COUNT="${{ github.event.inputs.count || '5' }}"
          python scripts/pod/generate_designs.py "$COUNT"

      - name: Create Printify + Etsy listings
        env:
          PRINTIFY_API_KEY: ${{ secrets.PRINTIFY_API_KEY }}
          PRINTIFY_SHOP_ID: ${{ secrets.PRINTIFY_SHOP_ID }}
          ETSY_API_KEY:     ${{ secrets.ETSY_API_KEY }}
          ETSY_SHOP_ID:     ${{ secrets.ETSY_SHOP_ID }}
        run: python scripts/pod/create_listing.py scripts/pod/output

      - name: Upload design artifacts (7-day retention)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pod-designs-${{ github.run_id }}
          path: scripts/pod/output/
          retention-days: 7
