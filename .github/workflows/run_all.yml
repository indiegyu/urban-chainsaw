name: 🚀 전체 파이프라인 즉시 실행

on:
  workflow_dispatch:

jobs:
  trigger-all:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger all workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: main
        run: |
          # 콘텐츠 생성 워크플로 먼저 실행
          content_workflows=(
            "daily_blog.yml"
            "daily_youtube.yml"
            "daily_shorts.yml"
            "daily_publish.yml"
            "daily_social.yml"
            "daily_pod.yml"
            "daily_podcast.yml"
            "weekly_gumroad.yml"
            "weekly_ebook.yml"
            "weekly_optimize.yml"
            "weekly_expand.yml"
          )

          for wf in "${content_workflows[@]}"; do
            echo "▶ 실행: $wf"
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/workflows/$wf/dispatches" \
              -d "{\"ref\":\"$BRANCH\"}"
            sleep 2
          done

          echo "⏳ 콘텐츠 워크플로 완료 대기 (5분)..."
          sleep 300

          # 대시보드는 마지막에 실행 (모든 데이터 반영)
          echo "▶ 실행: daily_dashboard.yml"
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/workflows/daily_dashboard.yml/dispatches" \
            -d "{\"ref\":\"$BRANCH\"}"

          echo "✅ 전체 파이프라인 실행 완료 (대시보드 5분 후 갱신)"
