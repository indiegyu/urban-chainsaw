name: Daily Podcast RSS Update

on:
  schedule:
    - cron: "30 9 * * *"   # 09:30 UTC (YouTube 업로드 후)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests python-dotenv -q

      - name: Update podcast RSS
        env:
          GITHUB_PAGES_URL: ${{ secrets.GITHUB_PAGES_URL }}
          PODCAST_TITLE: ${{ secrets.PODCAST_TITLE }}
          PODCAST_DESCRIPTION: ${{ secrets.PODCAST_DESCRIPTION }}
          PODCAST_AUTHOR: ${{ secrets.PODCAST_AUTHOR }}
          PODCAST_EMAIL: ${{ secrets.PODCAST_EMAIL }}
        run: python scripts/podcast/generate_rss.py

      - name: Commit podcast feed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin ${{ github.ref_name }}
          git reset --soft origin/${{ github.ref_name }}
          git add docs/podcast/ scripts/podcast/.podcast_episodes.json 2>/dev/null || true
          git commit -m "ci: podcast RSS updated [skip ci]" || echo "Nothing to commit"
          git push origin HEAD:${{ github.ref_name }}
