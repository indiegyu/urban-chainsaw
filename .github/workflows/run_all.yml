name: 🚀 전체 파이프라인 즉시 실행

on:
  workflow_dispatch:

jobs:
  trigger-all:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger all workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: main
        run: |
          workflows=(
            "daily_blog.yml"
            "daily_youtube.yml"
            "daily_shorts.yml"
            "daily_publish.yml"
            "daily_social.yml"
            "daily_pod.yml"
            "daily_podcast.yml"
            "weekly_gumroad.yml"
            "weekly_ebook.yml"
            "weekly_optimize.yml"
            "weekly_expand.yml"
            "daily_dashboard.yml"
          )

          for wf in "${workflows[@]}"; do
            echo "▶ 실행: $wf"
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/workflows/$wf/dispatches" \
              -d "{\"ref\":\"$BRANCH\"}"
            sleep 2
          done

          echo "✅ 전체 ${#workflows[@]}개 워크플로 실행 요청 완료"
