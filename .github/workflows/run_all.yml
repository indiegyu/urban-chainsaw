name: 🚀 전체 파이프라인 즉시 실행

on:
  workflow_dispatch:

jobs:
  # ── 1단계: 콘텐츠 생성 (동시 실행 가능) ─────────────────────────────────────
  trigger-content:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger content generation workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: main
        run: |
          content_workflows=(
            "daily_blog.yml"
            "daily_youtube.yml"
            "daily_shorts.yml"
            "daily_pod.yml"
            "daily_podcast.yml"
            "weekly_gumroad.yml"
            "weekly_ebook.yml"
            "weekly_optimize.yml"
            "weekly_expand.yml"
          )

          for wf in "${content_workflows[@]}"; do
            echo "▶ 실행: $wf"
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/workflows/$wf/dispatches" \
              -d "{\"ref\":\"$BRANCH\"}"
            sleep 2
          done
          echo "✅ 콘텐츠 생성 워크플로 실행 완료"

  # ── 2단계: 배포/소셜 (콘텐츠 생성 후 10분 대기) ──────────────────────────────
  trigger-publish:
    runs-on: ubuntu-latest
    needs: trigger-content
    steps:
      - name: Wait for content workflows to generate files
        run: |
          echo "⏳ 콘텐츠 생성 완료 대기 (10분)..."
          sleep 600

      - name: Trigger publish & social workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: main
        run: |
          publish_workflows=(
            "daily_publish.yml"
            "daily_social.yml"
          )

          for wf in "${publish_workflows[@]}"; do
            echo "▶ 실행: $wf"
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/workflows/$wf/dispatches" \
              -d "{\"ref\":\"$BRANCH\"}"
            sleep 2
          done
          echo "✅ 배포/소셜 워크플로 실행 완료"

  # ── 3단계: 대시보드 (배포 완료 후 5분 대기) ──────────────────────────────────
  trigger-dashboard:
    runs-on: ubuntu-latest
    needs: trigger-publish
    steps:
      - name: Wait for publish workflows
        run: |
          echo "⏳ 배포 완료 대기 (5분)..."
          sleep 300

      - name: Trigger revenue dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: main
        run: |
          echo "▶ 실행: daily_dashboard.yml"
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/workflows/daily_dashboard.yml/dispatches" \
            -d "{\"ref\":\"$BRANCH\"}"
          echo "✅ 전체 파이프라인 실행 완료 (대시보드 5분 후 갱신)"
